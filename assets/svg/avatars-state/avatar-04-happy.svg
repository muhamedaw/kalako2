<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img"
     aria-label="تحدي الإجابات player avatar 04 — happy state">
<style>

  @keyframes hop {
    0%,100% { transform: translate(0,0); }
    20%     { transform: translate(0,-22px) scale(1.04,0.96); }
    40%     { transform: translate(0,0)    scale(0.98,1.02); }
    60%     { transform: translate(0,-10px) scale(1.02,0.98); }
    80%     { transform: translate(0,0); }
  }
  .avatar-body { animation: hop 1.1s cubic-bezier(.5,1.6,.4,1) infinite;
                 transform-box: fill-box; transform-origin: center; }
  @keyframes twinkleS { 0%,100% { opacity:0.3 } 50% { opacity:1 } }
  .sparkle { animation: twinkleS 0.7s ease-in-out infinite; }
  .sparkle:nth-child(2) { animation-delay: 0.18s; }
  .sparkle:nth-child(3) { animation-delay: 0.36s; }
  .sparkle:nth-child(4) { animation-delay: 0.54s; }
  </style>

  <defs>
    <linearGradient id="gradBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12071F"/>
      <stop offset="100%" stop-color="#1B0E2E"/>
    </linearGradient>
    <linearGradient id="gradPinkPurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF5DA2"/>
      <stop offset="100%" stop-color="#7B5CFA"/>
    </linearGradient>
    <linearGradient id="gradPurplePink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B5CFA"/>
      <stop offset="100%" stop-color="#FF5DA2"/>
    </linearGradient>
    <radialGradient id="gradCyanPop" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#34E4EA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#34E4EA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gradAmberPop" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFB627" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFB627" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowPink" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#FF5DA2" flood-opacity="0.9"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#7B5CFA" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#34E4EA" flood-opacity="0.9"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#FFB627" flood-opacity="0.9"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#7B5CFA" flood-opacity="0.55"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>
<g transform="translate(150,210)" filter="url(#glowCyan)" class="sparkle"><rect x="-2" y="-14" width="4" height="28" rx="2" fill="#34E4EA"/><rect x="-14" y="-2" width="28" height="4" rx="2" fill="#34E4EA"/><circle cx="0" cy="0" r="3" fill="#FFFFFF"/></g>
  <g transform="translate(570,210)" filter="url(#glowCyan)" class="sparkle"><rect x="-2" y="-14" width="4" height="28" rx="2" fill="#34E4EA"/><rect x="-14" y="-2" width="28" height="4" rx="2" fill="#34E4EA"/><circle cx="0" cy="0" r="3" fill="#FFFFFF"/></g>
  <g transform="translate(160,580)" filter="url(#glowCyan)" class="sparkle"><rect x="-2" y="-14" width="4" height="28" rx="2" fill="#34E4EA"/><rect x="-14" y="-2" width="28" height="4" rx="2" fill="#34E4EA"/><circle cx="0" cy="0" r="3" fill="#FFFFFF"/></g>
  <g transform="translate(560,580)" filter="url(#glowCyan)" class="sparkle"><rect x="-2" y="-14" width="4" height="28" rx="2" fill="#34E4EA"/><rect x="-14" y="-2" width="28" height="4" rx="2" fill="#34E4EA"/><circle cx="0" cy="0" r="3" fill="#FFFFFF"/></g>
<g class="avatar-body">
<circle cx="360" cy="370" r="198" fill="none" stroke="#34E4EA" class="ring" stroke-width="6" opacity="0.9" filter="url(#glowCyan)"/>
<path d="M210,330 Q200,220 360,200 Q520,220 510,330 Z" fill="#FFB627" filter="url(#glowPurple)"/>

  <circle cx="360" cy="360" r="180" fill="#8E5A3C"/>
  <ellipse cx="183.6" cy="370" rx="14" ry="22" fill="#8E5A3C"/>
  <ellipse cx="536.4" cy="370" rx="14" ry="22" fill="#8E5A3C"/>
  <ellipse cx="261.0" cy="417.6" rx="28" ry="16" fill="#FF5DA2" opacity="0.45"/>
  <ellipse cx="459.0" cy="417.6" rx="28" ry="16" fill="#FF5DA2" opacity="0.45"/>
<path d="M268,335 Q290,347 312,335" stroke="#1B0E2E" stroke-width="6" fill="none" stroke-linecap="round"/><path d="M408,335 Q430,347 452,335" stroke="#1B0E2E" stroke-width="6" fill="none" stroke-linecap="round"/>
<path d="M310,430 Q360,480 410,430 Q360,492 310,430" fill="#1B0E2E"/><rect x="320" y="454" width="80" height="14" fill="#FFFFFF"/>
<circle cx="180" cy="335" r="14" fill="#34E4EA" filter="url(#glowCyan)"/><circle cx="540" cy="335" r="14" fill="#34E4EA" filter="url(#glowCyan)"/>

</g>
</svg>

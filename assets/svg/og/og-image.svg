<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img"
     aria-label="تحدي الإجابات — invite preview">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;family=Tajawal:wght@400;700;900&amp;display=swap');
    text { font-family: 'Cairo', 'Tajawal', 'Noto Sans Arabic', system-ui, sans-serif; }
  </style>

  <defs>
    <linearGradient id="gradBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#12071F"/>
      <stop offset="100%" stop-color="#1B0E2E"/>
    </linearGradient>
    <linearGradient id="gradPinkPurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF5DA2"/>
      <stop offset="100%" stop-color="#7B5CFA"/>
    </linearGradient>
    <linearGradient id="gradPurplePink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B5CFA"/>
      <stop offset="100%" stop-color="#FF5DA2"/>
    </linearGradient>
    <radialGradient id="gradCyanPop" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#34E4EA" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#34E4EA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gradAmberPop" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFB627" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFB627" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowPink" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#FF5DA2" flood-opacity="0.9"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#7B5CFA" flood-opacity="0.85"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#34E4EA" flood-opacity="0.9"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowAmber" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#FFB627" flood-opacity="0.9"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28" result="b" in="SourceGraphic"/>
      <feFlood flood-color="#7B5CFA" flood-opacity="0.55"/>
      <feComposite in2="b" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="gradCode" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B0E2E"/>
      <stop offset="100%" stop-color="#2A1758"/>
    </linearGradient>
    <pattern id="diagStripe" patternUnits="userSpaceOnUse" width="14" height="14"
             patternTransform="rotate(45)">
      <rect width="7" height="14" fill="#FF5DA2" opacity="0.55"/>
      <rect x="7" width="7" height="14" fill="#7B5CFA" opacity="0.0"/>
    </pattern>

  </defs>
  <!-- Strict safe zone 100..1100 x, 65..565 y -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#gradBg)"/>
  <!-- Corner neon blobs (low density — OG doesn't carry the full lobby mood) -->
  <g filter="url(#softBlob)" opacity="0.55">
    <ellipse cx="160"  cy="100" rx="220" ry="160" fill="#FF5DA2"/>
    <ellipse cx="1080" cy="540" rx="240" ry="180" fill="#7B5CFA"/>
    <ellipse cx="980"  cy="90"  rx="160" ry="120" fill="#34E4EA"/>
  </g>
  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="630"/><line x1="160" y1="0" x2="160" y2="630"/><line x1="240" y1="0" x2="240" y2="630"/><line x1="320" y1="0" x2="320" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/><line x1="560" y1="0" x2="560" y2="630"/><line x1="640" y1="0" x2="640" y2="630"/><line x1="720" y1="0" x2="720" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/><line x1="880" y1="0" x2="880" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/><line x1="1040" y1="0" x2="1040" y2="630"/><line x1="1120" y1="0" x2="1120" y2="630"/>
  </g>

  <!-- LEFT: brand mark + headline -------------------------------------------- -->
  <g transform="translate(80,180)" filter="url(#glowPink)">
    <rect x="0" y="0" width="180" height="180" rx="34" ry="34"
          fill="url(#gradPurplePink)" stroke="#FF5DA2" stroke-width="2"/>
    <rect x="8" y="8" width="164" height="164" rx="26" ry="26"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="90" y="128" text-anchor="middle" font-family="Cairo, Tajawal, 'Noto Sans Arabic', system-ui, sans-serif"
          font-weight="900" font-size="135" fill="#FFFFFF" letter-spacing="-4">؟</text>
  </g>
  <g transform="translate(120,80)" filter="url(#glowAmber)">
    <path d="M0,30 L14,0 L28,22 L42,0 L56,30 Z M0,30 L56,30 L56,38 L0,38 Z"
          fill="#FFB627" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="14" cy="0"  r="4" fill="#FF5DA2"/>
    <circle cx="28" cy="14" r="3" fill="#34E4EA"/>
    <circle cx="42" cy="0"  r="4" fill="#7B5CFA"/>
  </g>

  <g filter="url(#glowPink)">
    <text x="80" y="420" font-family="Cairo, Tajawal, 'Noto Sans Arabic', system-ui, sans-serif" font-weight="900"
          font-size="86" fill="url(#gradPinkPurple)" letter-spacing="-2">تحدي الإجابات</text>
  </g>
  <text x="80" y="476" font-family="Cairo, Tajawal, 'Noto Sans Arabic', system-ui, sans-serif" font-weight="600"
        font-size="28" fill="#E6DEFF" opacity="0.85">لعبة خداع جماعية • ادعُ ربعك!</text>
  <rect x="80" y="510" width="120" height="6" rx="3" fill="#34E4EA" filter="url(#glowCyan)"/>
  <rect x="210" y="510" width="60"  height="6" rx="3" fill="#FF5DA2" opacity="0.7"/>

  <!-- RIGHT: dashed empty room-code slot ------------------------------------- -->
  <g transform="translate(640,180)">
    <text x="0" y="0" font-family="Cairo, Tajawal, 'Noto Sans Arabic', system-ui, sans-serif" font-weight="900"
          font-size="34" fill="#FFB627" filter="url(#glowAmber)">كود الغرفة</text>

    <!-- dashed pink-purple rect — strictly the rectangle where the JS layer
         inside React will inject the live room code at copy-invite time.        -->
    <g filter="url(#glowPink)">
      <rect x="0" y="30" width="480" height="200" rx="28" ry="28"
            fill="url(#gradCode)" stroke="#FF5DA2" stroke-width="3"
            stroke-dasharray="14 10"/>
    </g>
    <!-- subtle hatched overlay so the slot is visibly empty even at thumbnail size -->
    <rect x="14" y="44" width="452" height="172" rx="20" ry="20"
          fill="url(#diagStripe)" opacity="0.08"/>
    <!-- placeholder dashes (a visible "------" the front-end will overwrite) -->
    <text x="240" y="155" text-anchor="middle" font-family="Cairo, Tajawal, 'Noto Sans Arabic', system-ui, sans-serif"
          font-weight="900" font-size="84" fill="#FFFFFF" opacity="0.45"
          letter-spacing="6">------</text>

    <!-- url line where the invite link is crudely shown -->
    <text x="0" y="278" font-family="Cairo, Tajawal, 'Noto Sans Arabic', system-ui, sans-serif" font-weight="700"
          font-size="22" fill="#E6DEFF" opacity="0.9">kalako.app/join</text>
    <g filter="url(#glowCyan)">
      <rect x="0" y="295" width="160" height="5" rx="2.5" fill="#34E4EA"/>
    </g>
    <rect x="170" y="295" width="80"  height="5" rx="2.5" fill="#FF5DA2" opacity="0.7"/>
  </g>

  <!-- bottom glitter -->
  <circle cx="60"   cy="600" r="4" fill="#34E4EA"  filter="url(#glowCyan)"/>
  <circle cx="1130" cy="50"  r="4" fill="#FF5DA2"  filter="url(#glowPink)"/>
  <circle cx="110"  cy="55"  r="3" fill="#FFFFFF"      opacity="0.85"/>
  <circle cx="1110" cy="600" r="3" fill="#FFB627" filter="url(#glowAmber)"/>
</svg>
